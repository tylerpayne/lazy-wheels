        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
          uv tool install ./packages/uv-release-monorepo
      - name: Prepare release version
        run: |
          uvr-steps prepare-release \
            --plan '${{ inputs.plan }}' \
            --package '${{ matrix.package }}'
      - name: Build package
        run: uv build "${{ matrix.path }}" --out-dir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.package }}-${{ matrix.runner }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.plan).publish_matrix }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-${{ matrix.package }}-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          name: ${{ matrix.title }}
          body: ${{ matrix.body }}
          files: dist/*.whl
          make_latest: false

  finalize:
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Set up
        run: |
          uv python install ${{ fromJSON(inputs.plan).python_version }}
          uv tool install ./packages/uv-release-monorepo
      - name: Finalize release
        run: uvr-steps finalize --plan '${{ inputs.plan }}'

